    <animate attributeName="height" from="0" to="202.40" dur="0.6s" begin="0.32s" fill="freeze" />
  </rect>
  <rect class="bar" x="468.60" y="108.00" width="58.80" height="184.00" fill="#14F195" opacity="0.9">
