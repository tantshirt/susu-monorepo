    <animate attributeName="height" from="0" to="257.60" dur="0.6s" begin="0.08s" fill="freeze" />
  </rect>
  <rect class="bar" x="216.60" y="52.80" width="58.80" height="239.20" fill="#14F195" opacity="0.9">
    <animate attributeName="y" from="292.00" to="52.80" dur="0.6s" begin="0.16s" fill="freeze" />
    <animate attributeName="height" from="0" to="239.20" dur="0.6s" begin="0.16s" fill="freeze" />
  </rect>
  <rect class="bar" x="300.60" y="71.20" width="58.80" height="220.80" fill="#14F195" opacity="0.9">
    <animate attributeName="y" from="292.00" to="71.20" dur="0.6s" begin="0.24s" fill="freeze" />
    <animate attributeName="height" from="0" to="220.80" dur="0.6s" begin="0.24s" fill="freeze" />
  </rect>
  <rect class="bar" x="384.60" y="89.60" width="58.80" height="202.40" fill="#14F195" opacity="0.9">
