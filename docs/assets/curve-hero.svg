    <animate attributeName="height" from="0" to="184.00" dur="0.6s" begin="0.40s" fill="freeze" />
  </rect>
  <rect class="bar" x="552.60" y="126.40" width="58.80" height="165.60" fill="#14F195" opacity="0.9">
    <animate attributeName="y" from="292.00" to="126.40" dur="0.6s" begin="0.48s" fill="freeze" />
    <animate attributeName="height" from="0" to="165.60" dur="0.6s" begin="0.48s" fill="freeze" />
