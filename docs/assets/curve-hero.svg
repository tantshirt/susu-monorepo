  <rect class="bar" x="48.60" y="16.00" width="58.80" height="276.00" fill="#14F195" opacity="0.9">
    <animate attributeName="y" from="292.00" to="16.00" dur="0.6s" begin="0.00s" fill="freeze" />
    <animate attributeName="height" from="0" to="276.00" dur="0.6s" begin="0.00s" fill="freeze" />
  </rect>
  <rect class="bar" x="132.60" y="34.40" width="58.80" height="257.60" fill="#14F195" opacity="0.9">
