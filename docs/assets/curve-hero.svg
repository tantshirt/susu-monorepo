<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320" role="img" aria-label="Susu dynamic-collateral curve for n=8, contribution=100">
  <title>Susu dynamic-collateral curve for n=8, contribution=100</title>
  <desc>Per-slot collateral C_i = contribution * (2 * n - 1 - i). Bars descend left-to-right; the polyline overlays the bar tops in mint. Story 8.4 animates the asset via SMIL; reduced-motion users see the static state.</desc>
  <style>@media (prefers-reduced-motion: reduce) { animate { display: none !important; } .bar, .curve { animation: none !important; } }</style>
  <line x1="36" y1="16" x2="36" y2="292" stroke="#71717a" stroke-width="1" />
