name: Verify

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Anchor CLI
        run: |
          ANCHOR_VERSION=1.0.2
          ANCHOR_SHA256=51c158a7b66db6d9802afe59cd73e6d78928791114b55567de5c0732e88770eb
          curl -fsSL "https://github.com/solana-foundation/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" -o /tmp/anchor
          echo "${ANCHOR_SHA256}  /tmp/anchor" | sha256sum -c -
          install -m 0755 /tmp/anchor "$HOME/.cargo/bin/anchor"
          anchor --version

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          cargo-build-sbf --version

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-verify-cargo-${{ hashFiles('**/Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-verify-cargo-

      - name: Run full reproducibility chain
        env:
          CLUSTER: devnet
          SUSU_DEMO_SKIP_PREFLIGHT: "1"
          SUSU_VERIFY_MAX_SECONDS: "600"
        run: bash scripts/verify.sh
