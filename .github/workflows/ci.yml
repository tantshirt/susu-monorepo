name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Anchor CLI
        run: |
          ANCHOR_VERSION=1.0.2
          ANCHOR_SHA256=51c158a7b66db6d9802afe59cd73e6d78928791114b55567de5c0732e88770eb
          curl -fsSL "https://github.com/solana-foundation/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" -o /tmp/anchor
          echo "${ANCHOR_SHA256}  /tmp/anchor" | sha256sum -c -
          install -m 0755 /tmp/anchor "$HOME/.cargo/bin/anchor"
          anchor --version

      - name: Install JS dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "pnpm-lock.yaml not found; running non-frozen install for bootstrap phase"
            pnpm install --no-frozen-lockfile
          fi

      - name: Anchor build
        run: anchor build

      - name: Cargo test (workspace)
        run: cargo test --workspace

      - name: pnpm test
        run: pnpm test

      - name: Check IDL hash
        run: bash scripts/check-idl-hash.sh

      - name: Check forbidden patterns
        run: bash scripts/check-patterns.sh

      - name: Check SDK parity
        run: bash scripts/check-sdk-parity.sh

      - name: Check i18n parity
        run: pnpm tsx scripts/check-i18n-parity.ts

      - name: Check FinCEN posture
        run: bash scripts/check-fincen-posture.sh
