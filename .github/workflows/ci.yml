name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache Cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Anchor CLI
        run: |
          ANCHOR_VERSION=1.0.2
          ANCHOR_SHA256=51c158a7b66db6d9802afe59cd73e6d78928791114b55567de5c0732e88770eb
          curl -fsSL "https://github.com/solana-foundation/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" -o /tmp/anchor
          echo "${ANCHOR_SHA256}  /tmp/anchor" | sha256sum -c -
          install -m 0755 /tmp/anchor "$HOME/.cargo/bin/anchor"
          anchor --version

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          cargo-build-sbf --version

      - name: Install JS dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            echo "pnpm-lock.yaml not found; running non-frozen install for bootstrap phase"
            pnpm install --no-frozen-lockfile
          fi

      - name: Anchor build
        run: RUSTUP_TOOLCHAIN=stable anchor build --ignore-keys

      - name: Cargo test (workspace)
        run: RUSTUP_TOOLCHAIN=stable cargo test --workspace

      - name: Cargo invariant proof (no strategic default)
        run: RUSTUP_TOOLCHAIN=stable cargo test --test no_strategic_default --release

      - name: Check adversary report determinism
        run: RUSTUP_TOOLCHAIN=stable bash scripts/check-adversary-determinism.sh

      - name: Check canonical adversary report artifact
        run: |
          CANONICAL_SEED="$(node -e "console.log(require('./audits/adversary/adversary-report.json').run_metadata.seed)")"
          COMMIT_SHA="${CANONICAL_SEED}" CHECK_CANONICAL=1 RUSTUP_TOOLCHAIN=stable bash scripts/check-adversary-determinism.sh

      - name: pnpm test
        run: pnpm test --if-present

      - name: Check IDL hash
        run: bash scripts/check-idl-hash.sh

      - name: Check forbidden patterns
        run: bash scripts/check-patterns.sh

      - name: Check SDK parity
        run: bash scripts/check-sdk-parity.sh

      - name: Check i18n parity
        run: pnpm exec tsx scripts/check-i18n-parity.ts

      - name: Check FinCEN posture
        run: bash scripts/check-fincen-posture.sh

      - name: Check BAD skill prompt sync
        run: bash scripts/check-bad-skill-sync.sh

  susu-demo-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Anchor CLI
        run: |
          ANCHOR_VERSION=1.0.2
          ANCHOR_SHA256=51c158a7b66db6d9802afe59cd73e6d78928791114b55567de5c0732e88770eb
          curl -fsSL "https://github.com/solana-foundation/anchor/releases/download/v${ANCHOR_VERSION}/anchor-${ANCHOR_VERSION}-x86_64-unknown-linux-gnu" -o /tmp/anchor
          echo "${ANCHOR_SHA256}  /tmp/anchor" | sha256sum -c -
          install -m 0755 /tmp/anchor "$HOME/.cargo/bin/anchor"
          anchor --version

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version

      - name: Install Surfpool
        run: |
          curl -sL https://run.surfpool.run/ | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          surfpool --version

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Surfpool devnet fork
        run: |
          set -euo pipefail
          surfpool start --network devnet --port 8899 --ci --no-deploy --no-tui --no-studio > /tmp/surfpool.log 2>&1 &
          echo "$!" > /tmp/surfpool.pid
          for attempt in $(seq 1 30); do
            if curl -fsS -X POST http://127.0.0.1:8899 \
              -H 'content-type: application/json' \
              -d '{"jsonrpc":"2.0","id":"susu-demo-ci","method":"getHealth"}' >/tmp/surfpool-health.json; then
              cat /tmp/surfpool-health.json
              exit 0
            fi
            sleep 1
          done
          cat /tmp/surfpool.log
          exit 1

      - name: Run susu demo smoke
        env:
          SUSU_DEMO_RPC_URL: http://127.0.0.1:8899
          SUSU_DEMO_CLUSTER: devnet
          SUSU_DEMO_MAX_SECONDS: 60
          SUSU_DEMO_KEYPAIR_DIR: .susu-demo/ci-keypairs
          SUSU_DEMO_KEYPAIR_PATH: .susu-demo/ci-payer.json
        run: |
          set -euo pipefail
          pnpm susu:demo | tee /tmp/susu-demo.log
          # Parse final line like: Demo complete. Wall-clock: 47s.
          elapsed="$(sed -nE 's/.*Wall-clock: ([0-9]+)s.*/\1/p' /tmp/susu-demo.log | tail -1)"
          if [ -z "$elapsed" ]; then
            echo "Could not parse Wall-clock: ([0-9]+)s from pnpm susu:demo output"
            exit 1
          fi
          MAX_SECONDS=60
          if [ "$elapsed" -gt "$MAX_SECONDS" ]; then
            echo "pnpm susu:demo exceeded ${MAX_SECONDS}s budget: ${elapsed}s"
            exit 1
          fi

      - name: Stop Surfpool
        if: always()
        run: |
          if [ -f /tmp/surfpool.pid ]; then
            kill "$(cat /tmp/surfpool.pid)" 2>/dev/null || true
          fi
