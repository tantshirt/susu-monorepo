name: Immutability check

# Story 9.3 — Post-mainnet immutability gate (FR30).
#
# Asserts on every push to main (and nightly) that:
#   1. The deployed program upgrade authority remains the System Program
#      incinerator (1nc1nerator11111111111111111111111111111111).
#   2. The on-chain IDL hash matches IDL_FREEZE.md.
#
# Pre-mainnet no-op: the job is skipped if MAINNET_PROGRAM_ID.md does not
# exist. Story 9.2 (the mainnet ceremony) creates that file as the trigger
# that arms this workflow.

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 09:00 UTC — long-tail catch for any drift the push trigger
    # missed (e.g. if mainnet was somehow tampered with off-cycle).
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  immutability-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip if mainnet not deployed yet
        id: gate
        run: |
          if [[ ! -f MAINNET_PROGRAM_ID.md ]]; then
            echo "MAINNET_PROGRAM_ID.md not found — pre-mainnet no-op"
            echo "deployed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "deployed=true" >> "$GITHUB_OUTPUT"

      - name: Parse program id from MAINNET_PROGRAM_ID.md
        if: steps.gate.outputs.deployed == 'true'
        id: program
        run: |
          PROGRAM_ID="$(grep -E '^\| Program ID \|' MAINNET_PROGRAM_ID.md | sed -E 's/.*`([^`]+)`.*/\1/')"
          if [[ -z "$PROGRAM_ID" ]]; then
            echo "::error::failed to parse program id from MAINNET_PROGRAM_ID.md"
            exit 1
          fi
          echo "program_id=${PROGRAM_ID}" >> "$GITHUB_OUTPUT"

      - name: Install Solana CLI
        if: steps.gate.outputs.deployed == 'true'
        run: |
          SOLANA_VERSION=2.0.21
          sh -c "$(curl -sSfL https://release.anza.xyz/v${SOLANA_VERSION}/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Run scripts/check-immutability.sh against mainnet-beta
        if: steps.gate.outputs.deployed == 'true'
        env:
          CLUSTER: mainnet-beta
          SUSU_PROGRAM_ID: ${{ steps.program.outputs.program_id }}
        run: bash scripts/check-immutability.sh
