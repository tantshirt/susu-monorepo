name: visual regression

# Story 7.17 — runs Playwright visual regression on every PR. The first run
# is informational (baselines are being established by the same PR that adds
# this workflow), so the merge gate is `lint-and-build` from `ci.yml`. After
# baselines land on `main`, this workflow becomes a real diff gate.
#
# Diff artifacts (`playwright-report/` HTML + actual/expected PNGs) are
# uploaded on failure so reviewers can eyeball the regression without
# pulling the branch.

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'output_susu/**'
      - '_bmad/**'
      - 'log/**'
      - 'docs/**'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'output_susu/**'
      - '_bmad/**'
      - 'log/**'
      - 'docs/**'

jobs:
  visual:
    name: Playwright visual regression
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @susu/reference exec playwright install --with-deps chromium

      - name: Compose CI .env.local for visual screenshots
        # apps/reference/.env.example intentionally ships with an empty
        # NEXT_PUBLIC_PRIVY_APP_ID so local devs are forced to set a real
        # one before `next dev` boots. CI doesn't need real Privy login —
        # the visual specs only mask the wallet/cluster pill and snapshot
        # the surrounding chrome — so we copy the example and then override
        # the Privy ID with a 25-character CI-shape value that satisfies
        # the lib/env.ts Zod schema (`.length(25)`). NODE_ENV stays
        # "development" under `next dev`, so the production-only refine
        # that rejects the doc placeholder doesn't fire.
        run: |
          if [ -f apps/reference/.env.example ]; then
            cp apps/reference/.env.example apps/reference/.env.local
            sed -i 's|^NEXT_PUBLIC_PRIVY_APP_ID=$|NEXT_PUBLIC_PRIVY_APP_ID=cltest1234567890abcdefghi|' apps/reference/.env.local
          fi

      - name: Run visual regression (bootstrap mode — see TODO below)
        # BOOTSTRAP MODE: the committed snapshots in
        # apps/reference/tests/e2e/__snapshots__/visual.spec.ts-snapshots/
        # are mac-generated (`*-darwin.png`). On Linux CI Playwright looks
        # for `*-linux.png` baselines that do not exist, so every spec
        # fails. `--update-snapshots` writes Linux baselines on this run
        # and exits 0; the snapshots are uploaded as an artifact below for
        # one-time commit.
        #
        # TODO(visual-baselines): once a maintainer downloads the
        # `playwright-snapshots` artifact and commits the `*-linux.png`
        # files alongside the existing `*-darwin.png` baselines, REMOVE
        # `--update-snapshots` from the command below so this workflow
        # becomes a real regression gate again.
        run: pnpm --filter @susu/reference run e2e:visual -- --update-snapshots
        env:
          CI: 'true'

      - name: Upload Playwright diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/reference/playwright-report/
            apps/reference/test-results/
          retention-days: 14

      - name: Upload generated snapshots (for one-time bootstrap commit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots
          path: apps/reference/tests/e2e/__snapshots__/
          retention-days: 14
          if-no-files-found: warn
